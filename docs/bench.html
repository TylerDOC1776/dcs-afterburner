<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DCS Afterburner — Bench</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --base:     #1e1e2e;
      --mantle:   #181825;
      --crust:    #11111b;
      --surface0: #313244;
      --surface1: #45475a;
      --surface2: #585b70;
      --overlay0: #6c7086;
      --overlay1: #7f849c;
      --text:     #cdd6f4;
      --subtext0: #a6adc8;
      --subtext1: #bac2de;
      --blue:     #89b4fa;
      --green:    #a6e3a1;
      --red:      #f38ba8;
      --yellow:   #f9e2af;
      --peach:    #fab387;
      --mauve:    #cba6f7;
      --teal:     #94e2d5;
      --sky:      #89dceb;
    }

    html { min-height: 100%; background: var(--crust); }

    body {
      font-family: 'Fira Code', 'JetBrains Mono', 'Cascadia Code', monospace;
      font-size: 13.5px;
      line-height: 1.5;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 48px;
      min-height: 100vh;
      background: var(--crust);
      gap: 20px;
    }

    .window {
      width: 100%;
      max-width: 960px;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 24px 80px rgba(0,0,0,.7);
    }

    .titlebar {
      background: var(--mantle);
      padding: 11px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--surface0);
      user-select: none;
    }
    .win-controls { display: flex; gap: 7px; }
    .wc { width: 12px; height: 12px; border-radius: 50%; }
    .wc-close  { background: #f38ba8; }
    .wc-min    { background: #f9e2af; }
    .wc-max    { background: #a6e3a1; }
    .win-title { flex: 1; text-align: center; font-size: 12px; color: var(--overlay0); }

    .panel {
      background: var(--base);
      padding: 20px 24px;
    }

    h1 {
      font-size: 15px;
      font-weight: 700;
      color: var(--blue);
      margin-bottom: 4px;
    }
    .subtitle { color: var(--overlay1); font-size: 12px; margin-bottom: 20px; }

    /* Run list */
    .run-list { display: flex; flex-direction: column; gap: 8px; }

    .run-card {
      background: var(--mantle);
      border: 1px solid var(--surface0);
      border-radius: 6px;
      padding: 12px 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: border-color 0.15s;
    }
    .run-card:hover { border-color: var(--blue); }
    .run-card.active { border-color: var(--blue); background: var(--surface0); }

    .run-mission { font-weight: 700; color: var(--text); flex: 1; }
    .run-meta { color: var(--subtext0); font-size: 12px; text-align: right; }
    .run-duration { color: var(--teal); font-size: 12px; }

    /* Detail panel */
    .detail { display: none; flex-direction: column; gap: 20px; }
    .detail.visible { display: flex; }

    .detail-header {
      display: flex;
      align-items: baseline;
      gap: 12px;
      border-bottom: 1px solid var(--surface0);
      padding-bottom: 12px;
    }
    .detail-mission { font-size: 15px; font-weight: 700; color: var(--blue); }
    .detail-meta { color: var(--subtext0); font-size: 12px; }

    .summary-strip {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }
    @media (max-width: 640px) { .summary-strip { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
    .summary-item {
      background: var(--mantle);
      border: 1px solid var(--surface0);
      border-radius: 6px;
      padding: 8px 10px;
      min-width: 0;
    }
    .summary-label { display: block; font-size: 10px; color: var(--overlay1); text-transform: uppercase; margin-bottom: 4px; }
    .summary-value { font-size: 12px; color: var(--text); }

    .charts-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    @media (max-width: 640px) { .charts-grid { grid-template-columns: 1fr; } }

    .chart-box {
      background: var(--mantle);
      border: 1px solid var(--surface0);
      border-radius: 6px;
      padding: 14px;
    }
    .chart-label {
      font-size: 11px;
      color: var(--overlay1);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 10px;
    }
    canvas { max-height: 180px; }

    /* Findings */
    .findings-list { display: flex; flex-direction: column; gap: 6px; }
    .finding {
      display: flex;
      gap: 10px;
      background: var(--mantle);
      border: 1px solid var(--surface0);
      border-radius: 6px;
      padding: 10px 14px;
      align-items: baseline;
    }
    .sev { font-size: 11px; font-weight: 700; min-width: 64px; text-transform: uppercase; }
    .sev-critical { color: var(--red); }
    .sev-warning  { color: var(--yellow); }
    .sev-info     { color: var(--sky); }
    .finding-rule { color: var(--mauve); min-width: 80px; }
    .finding-detail { color: var(--subtext1); font-size: 12px; }

    .empty { color: var(--overlay0); font-size: 12px; padding: 12px 0; }
    .back-btn {
      background: none;
      border: 1px solid var(--surface1);
      border-radius: 4px;
      color: var(--subtext0);
      padding: 4px 10px;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
    }
    .back-btn:hover { border-color: var(--blue); color: var(--blue); }

    .loading { color: var(--overlay0); font-size: 12px; }
    .error-msg { color: var(--red); font-size: 12px; }

    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--overlay1);
      margin-bottom: 8px;
    }

    .analytics-section { margin-top: 24px; }
    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--surface0);
      border-radius: 6px;
      background: var(--mantle);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 640px;
    }
    th, td {
      padding: 9px 12px;
      border-bottom: 1px solid var(--surface0);
      text-align: left;
      vertical-align: top;
      white-space: nowrap;
    }
    tr:last-child td { border-bottom: 0; }
    th {
      color: var(--overlay1);
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
    }
    td { color: var(--subtext1); font-size: 12px; }
    .table-mission {
      color: var(--text);
      font-weight: 700;
      white-space: normal;
      min-width: 180px;
    }
    .score-low { color: var(--red); font-weight: 700; }
    .score-mid { color: var(--yellow); font-weight: 700; }
    .score-high { color: var(--green); font-weight: 700; }
    .rule-id { color: var(--mauve); font-weight: 700; }
    .table-wrap .empty,
    .table-wrap .loading,
    .table-wrap .error-msg { padding: 12px; }
  </style>
</head>
<body>

<div class="window">
  <div class="titlebar">
    <div class="win-controls">
      <div class="wc wc-close"></div>
      <div class="wc wc-min"></div>
      <div class="wc wc-max"></div>
    </div>
    <div class="win-title">afterburner — bench dashboard</div>
  </div>
  <div class="panel">

    <!-- Run list view -->
    <div id="view-list">
      <h1>Bench Runs</h1>
      <div class="subtitle">DCS server performance captured via GM_BENCH</div>
      <div id="run-list-container" class="run-list">
        <div class="loading">Loading runs…</div>
      </div>

      <div class="analytics-section">
        <div class="section-title">Worst Runs</div>
        <div id="worst-runs-container" class="table-wrap">
          <div class="loading">Loading runs…</div>
        </div>
      </div>

      <div class="analytics-section">
        <div class="section-title">Rule Effectiveness</div>
        <div id="rule-effectiveness-container" class="table-wrap">
          <div class="loading">Loading findings…</div>
        </div>
      </div>
    </div>

    <!-- Run detail view -->
    <div id="view-detail" class="detail">
      <div class="detail-header">
        <button class="back-btn" onclick="showList()">← back</button>
        <span class="detail-mission" id="detail-mission"></span>
        <span class="detail-meta" id="detail-meta"></span>
      </div>

      <div id="summary-strip" class="summary-strip"></div>

      <div>
        <div class="section-title">Scheduler &amp; AI Load</div>
        <div class="charts-grid">
          <div class="chart-box">
            <div class="chart-label">Scheduler Drift (s)</div>
            <canvas id="chart-drift"></canvas>
          </div>
          <div class="chart-box">
            <div class="chart-label">Active Groups / Units</div>
            <canvas id="chart-groups"></canvas>
          </div>
        </div>
      </div>

      <div id="cpu-section" style="display:none">
        <div class="section-title">Server CPU &amp; Memory</div>
        <div class="charts-grid">
          <div class="chart-box">
            <div class="chart-label">CPU %</div>
            <canvas id="chart-cpu"></canvas>
          </div>
          <div class="chart-box">
            <div class="chart-label">Memory (MB)</div>
            <canvas id="chart-mem"></canvas>
          </div>
        </div>
      </div>

      <div id="findings-section">
        <div class="section-title">Mission Findings</div>
        <div id="findings-list" class="findings-list"></div>
      </div>
    </div>

  </div>
</div>

<script>
const API = 'https://goon.gsquad.cc/api/v1';
const charts = {};

function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, ch => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;',
  })[ch]);
}

function fmtDuration(s) {
  if (!s) return '—';
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60);
  return h > 0 ? `${h}h ${m}m` : `${m}m`;
}

function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleString(undefined, {
    month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
  });
}

function fmtNumber(value, digits = 1) {
  if (value === null || value === undefined || value === '') return '—';
  const number = Number(value);
  return Number.isFinite(number) ? number.toFixed(digits) : '—';
}

function fmtMetric(value, digits, unit) {
  const formatted = fmtNumber(value, digits);
  return formatted === '—' ? formatted : `${formatted}${unit}`;
}

function fmtScore(value) {
  if (value === null || value === undefined || value === '') return '—';
  const number = Number(value);
  return Number.isFinite(number) ? number.toFixed(0) : '—';
}

function scoreClass(value) {
  const number = Number(value);
  if (!Number.isFinite(number)) return '';
  if (number < 50) return 'score-low';
  if (number < 80) return 'score-mid';
  return 'score-high';
}

function severityClass(value) {
  const safe = String(value ?? '').toLowerCase().replace(/[^a-z0-9_-]/g, '');
  return safe ? `sev-${safe}` : '';
}

function chartDefaults(label, color) {
  return {
    type: 'line',
    options: {
      animation: false,
      responsive: true,
      maintainAspectRatio: true,
      plugins: { legend: { display: label !== null } },
      scales: {
        x: { ticks: { color: '#6c7086', font: { family: 'Fira Code', size: 10 } }, grid: { color: '#313244' } },
        y: { ticks: { color: '#6c7086', font: { family: 'Fira Code', size: 10 } }, grid: { color: '#313244' } },
      },
    },
  };
}

function makeChart(id, datasets, xLabels, showLegend) {
  if (charts[id]) charts[id].destroy();
  const cfg = chartDefaults(showLegend ? true : null);
  cfg.data = { labels: xLabels, datasets };
  if (!showLegend) cfg.options.plugins.legend.display = false;
  charts[id] = new Chart(document.getElementById(id), cfg);
}

function line(label, data, color) {
  return {
    label,
    data,
    borderColor: color,
    backgroundColor: color + '22',
    borderWidth: 1.5,
    pointRadius: 0,
    tension: 0.3,
    fill: true,
  };
}

function summaryValue(run, key, fallback = '—') {
  const summary = run.summary || {};
  const value = summary[key];
  if (value === null || value === undefined || value === '') return fallback;
  return value;
}

function renderWorstRuns(runs) {
  const container = document.getElementById('worst-runs-container');
  const worst = runs
    .filter(run => {
      const summary = run.summary || {};
      return (
        summary.validity_status === 'valid' &&
        summary.performance_score !== null &&
        summary.performance_score !== undefined
      );
    })
    .sort((a, b) =>
      Number(a.summary.performance_score) - Number(b.summary.performance_score)
    )
    .slice(0, 10);

  if (!worst.length) {
    container.innerHTML = '<div class="empty">No scored valid runs.</div>';
    return;
  }

  container.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Mission</th>
          <th>Score</th>
          <th>P95 Drift</th>
          <th>P95 CPU</th>
          <th>Findings</th>
          <th>Date</th>
        </tr>
      </thead>
      <tbody>
        ${worst.map(run => {
          const summary = run.summary || {};
          return `
            <tr>
              <td class="table-mission">${escapeHtml(run.mission)}</td>
              <td class="${scoreClass(summary.performance_score)}">${fmtScore(summary.performance_score)}</td>
              <td>${fmtMetric(summary.p95_drift_s, 3, 's')}</td>
              <td>${fmtMetric(summary.p95_cpu_pct, 1, '%')}</td>
              <td>${summary.findings_count ?? '—'}</td>
              <td>${fmtDate(run.started_at)}</td>
            </tr>
          `;
        }).join('')}
      </tbody>
    </table>
  `;
}

async function renderRuleEffectiveness(runs) {
  const container = document.getElementById('rule-effectiveness-container');
  const candidates = runs
    .filter(run => {
      const summary = run.summary || {};
      return (
        summary.validity_status === 'valid' &&
        Number(summary.findings_count || 0) > 0
      );
    })
    .sort((a, b) => new Date(b.started_at) - new Date(a.started_at))
    .slice(0, 20);

  if (!candidates.length) {
    container.innerHTML = '<div class="empty">No valid runs with findings.</div>';
    return;
  }

  container.innerHTML = '<div class="loading">Loading findings…</div>';
  const details = await Promise.all(candidates.map(async run => {
    try {
      const resp = await fetch(`${API}/bench/runs/${run.id}`);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      return await resp.json();
    } catch {
      return null;
    }
  }));

  const rules = new Map();
  for (const run of details) {
    for (const finding of run?.findings || []) {
      if (!finding.rule_id) continue;
      const current = rules.get(finding.rule_id) || {
        rule_id: finding.rule_id,
        hit_count: 0,
        critical_count: 0,
        warning_count: 0,
      };
      current.hit_count += 1;
      if (finding.severity === 'critical') current.critical_count += 1;
      if (finding.severity === 'warning') current.warning_count += 1;
      rules.set(finding.rule_id, current);
    }
  }

  const rows = Array.from(rules.values())
    .sort((a, b) =>
      b.hit_count - a.hit_count || a.rule_id.localeCompare(b.rule_id)
    );

  if (!rows.length) {
    container.innerHTML = '<div class="empty">No findings returned by run detail.</div>';
    return;
  }

  container.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Rule</th>
          <th>Hits</th>
          <th>Critical</th>
          <th>Warning</th>
        </tr>
      </thead>
      <tbody>
        ${rows.map(rule => `
          <tr>
            <td class="rule-id">${escapeHtml(rule.rule_id)}</td>
            <td>${rule.hit_count}</td>
            <td class="sev-critical">${rule.critical_count}</td>
            <td class="sev-warning">${rule.warning_count}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

async function loadRuns() {
  const container = document.getElementById('run-list-container');
  const worstContainer = document.getElementById('worst-runs-container');
  const ruleContainer = document.getElementById('rule-effectiveness-container');
  try {
    const resp = await fetch(`${API}/bench/runs?limit=50`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const runs = await resp.json();
    if (!runs.length) {
      container.innerHTML = '<div class="empty">No runs recorded yet.</div>';
      worstContainer.innerHTML = '<div class="empty">No runs recorded yet.</div>';
      ruleContainer.innerHTML = '<div class="empty">No runs recorded yet.</div>';
      return;
    }
    container.innerHTML = '';
    for (const run of runs) {
      const card = document.createElement('div');
      card.className = 'run-card';
      card.innerHTML = `
        <div class="run-mission">${escapeHtml(run.mission)}</div>
        <div class="run-duration">${fmtDuration(run.duration_s)}</div>
        <div class="run-meta">${fmtDate(run.started_at)}</div>
      `;
      card.addEventListener('click', () => loadRun(run.id, card));
      container.appendChild(card);
    }
    renderWorstRuns(runs);
    await renderRuleEffectiveness(runs);
  } catch (e) {
    container.innerHTML = `<div class="error-msg">Failed to load runs: ${e.message}</div>`;
    worstContainer.innerHTML = '<div class="error-msg">Failed to load runs.</div>';
    ruleContainer.innerHTML = '<div class="error-msg">Failed to load findings.</div>';
  }
}

async function loadRun(runId, card) {
  document.querySelectorAll('.run-card').forEach(c => c.classList.remove('active'));
  if (card) card.classList.add('active');

  document.getElementById('view-list').style.display = 'none';
  const detail = document.getElementById('view-detail');
  detail.classList.add('visible');
  document.getElementById('detail-mission').textContent = '…';

  try {
    const resp = await fetch(`${API}/bench/runs/${runId}`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const run = await resp.json();

    document.getElementById('detail-mission').textContent = run.mission;
    document.getElementById('detail-meta').textContent =
      `${fmtDate(run.started_at)}  ·  ${fmtDuration(run.duration_s)}`;

    const summaryStrip = document.getElementById('summary-strip');
    summaryStrip.innerHTML = `
      <div class="summary-item">
        <span class="summary-label">validity</span>
        <span class="summary-value">${summaryValue(run, 'validity_status')}</span>
      </div>
      <div class="summary-item">
        <span class="summary-label">score</span>
        <span class="summary-value">${summaryValue(run, 'performance_score')}</span>
      </div>
      <div class="summary-item">
        <span class="summary-label">bench samples</span>
        <span class="summary-value">${summaryValue(run, 'bench_sample_count')}</span>
      </div>
      <div class="summary-item">
        <span class="summary-label">cpu samples</span>
        <span class="summary-value">${summaryValue(run, 'cpu_sample_count')}</span>
      </div>
    `;

    const ts = run.bench_timeseries || [];
    const labels = ts.map(r => `${Math.round(r.elapsed_s / 60)}m`);

    makeChart('chart-drift', [line('drift', ts.map(r => r.drift_s.toFixed(3)), '#f38ba8')], labels, false);
    makeChart('chart-groups', [
      line('groups', ts.map(r => r.groups), '#89b4fa'),
      line('units',  ts.map(r => r.units),  '#a6e3a1'),
    ], labels, true);

    const cpu = run.cpu_timeseries || [];
    const cpuSection = document.getElementById('cpu-section');
    if (cpu.length) {
      cpuSection.style.display = '';
      const cpuLabels = cpu.map(r => `${Math.round(r.elapsed_s / 60)}m`);
      makeChart('chart-cpu', [line('cpu %', cpu.map(r => r.cpu_pct.toFixed(1)), '#fab387')], cpuLabels, false);
      makeChart('chart-mem', [line('mem MB', cpu.map(r => r.mem_mb.toFixed(0)), '#cba6f7')], cpuLabels, false);
    } else {
      cpuSection.style.display = 'none';
    }

    const findings = run.findings || [];
    const fl = document.getElementById('findings-list');
    if (!findings.length) {
      fl.innerHTML = '<div class="empty">No findings.</div>';
    } else {
      fl.innerHTML = findings.map(f => `
        <div class="finding">
          <span class="sev ${severityClass(f.severity)}">${escapeHtml(f.severity)}</span>
          <span class="finding-rule">${escapeHtml(f.rule_id)}</span>
          <span class="finding-detail">${escapeHtml(f.detail || '')}</span>
        </div>
      `).join('');
    }

  } catch (e) {
    document.getElementById('detail-mission').textContent = `Error: ${e.message}`;
  }
}

function showList() {
  document.getElementById('view-list').style.display = '';
  document.getElementById('view-detail').classList.remove('visible');
  document.querySelectorAll('.run-card').forEach(c => c.classList.remove('active'));
}

loadRuns();
</script>
</body>
</html>
