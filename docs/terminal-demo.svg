<svg xmlns="http://www.w3.org/2000/svg" width="720" height="969">
  <rect width="720" height="969" fill="#1b1e28" rx="6"/>
  <text x="16" y="33" font-family="'Courier New',Courier,'Lucida Console',monospace" font-size="13" xml:space="preserve"><tspan fill="#a6e3a1">$ </tspan><tspan fill="#89b4fa" font-weight="bold">afterburner</tspan><tspan fill="#89dceb"> analyze</tspan><tspan fill="#f9e2af"> operation_iron_rain.miz</tspan></text>
  <text x="16" y="73" font-family="'Courier New',Courier,'Lucida Console',monospace" font-size="13" xml:space="preserve"><tspan fill="#6c7086"> Theatre           </tspan><tspan fill="#cdd6f4"> Caucasus</tspan></text>
  <text x="16" y="93" font-family="'Courier New',Courier,'Lucida Console',monospace" font-size="13" xml:space="preserve"><tspan fill="#6c7086"> Total units       </tspan><tspan fill="#cdd6f4">     2 104</tspan></text>
  <text x="16" y="113" font-family="'Courier New',Courier,'Lucida Console',monospace" font-size="13" xml:space="preserve"><tspan fill="#6c7086">   Active at start </tspan><tspan fill="#cdd6f4">       648</tspan></text>
  <text x="16" y="133" font-family="'Courier New',Courier,'Lucida Console',monospace" font-size="13" xml:space="preserve"><tspan fill="#6c7086">   Late activation </tspan><tspan fill="#cdd6f4">     1 456</tspan></text>
  <text x="16" y="153" font-family="'Courier New',Courier,'Lucida Console',monospace" font-size="13" xml:space="preserve"><tspan fill="#6c7086"> Player slots      </tspan><tspan fill="#cdd6f4">        32</tspan></text>
  <text x="16" y="173" font-family="'Courier New',Courier,'Lucida Console',monospace" font-size="13" xml:space="preserve"><tspan fill="#6c7086"> Groups (total)    </tspan><tspan fill="#cdd6f4">       312</tspan></text>
  <text x="16" y="193" font-family="'Courier New',Courier,'Lucida Console',monospace" font-size="13" xml:space="preserve"><tspan fill="#6c7086">   Active groups   </tspan><tspan fill="#cdd6f4">       174</tspan></text>
  <text x="16" y="213" font-family="'Courier New',Courier,'Lucida Console',monospace" font-size="13" xml:space="preserve"><tspan fill="#6c7086"> Static objects    </tspan><tspan fill="#cdd6f4">       823</tspan></text>
  <text x="16" y="233" font-family="'Courier New',Courier,'Lucida Console',monospace" font-size="13" xml:space="preserve"><tspan fill="#6c7086"> Triggers          </tspan><tspan fill="#cdd6f4">       168</tspan></text>
  <text x="16" y="253" font-family="'Courier New',Courier,'Lucida Console',monospace" font-size="13" xml:space="preserve"><tspan fill="#6c7086"> Trigger zones     </tspan><tspan fill="#cdd6f4">       124</tspan></text>
  <text x="16" y="293" font-family="'Courier New',Courier,'Lucida Console',monospace" font-size="13" xml:space="preserve"><tspan fill="#6c7086">Risk score: </tspan><tspan fill="#f38ba8" font-weight="bold">34/100 — CRITICAL</tspan></text>
  <text x="16" y="333" font-family="'Courier New',Courier,'Lucida Console',monospace" font-size="13" xml:space="preserve"><tspan fill="#cdd6f4">  </tspan><tspan fill="#f38ba8" font-weight="bold">CRITICAL</tspan><tspan fill="#cdd6f4">  </tspan><tspan fill="#6c7086">BLOT_001</tspan><tspan fill="#cdd6f4">  Extreme active unit count</tspan></text>
  <text x="16" y="353" font-family="'Courier New',Courier,'Lucida Console',monospace" font-size="13" xml:space="preserve"><tspan fill="#cdd6f4">            648 units active at mission start (threshold: 600). Severe performance</tspan></text>
  <text x="16" y="373" font-family="'Courier New',Courier,'Lucida Console',monospace" font-size="13" xml:space="preserve"><tspan fill="#cdd6f4">            risk on multiplayer servers.</tspan></text>
  <text x="16" y="393" font-family="'Courier New',Courier,'Lucida Console',monospace" font-size="13" xml:space="preserve"><tspan fill="#cdd6f4">            </tspan><tspan fill="#a6e3a1">Fix:</tspan><tspan fill="#cdd6f4"> Move non-essential groups to late activation.</tspan></text>
  <text x="16" y="433" font-family="'Courier New',Courier,'Lucida Console',monospace" font-size="13" xml:space="preserve"><tspan fill="#cdd6f4">  </tspan><tspan fill="#f38ba8" font-weight="bold">CRITICAL</tspan><tspan fill="#cdd6f4">  </tspan><tspan fill="#6c7086">BLOT_002</tspan><tspan fill="#cdd6f4">  Extreme static object count</tspan></text>
  <text x="16" y="453" font-family="'Courier New',Courier,'Lucida Console',monospace" font-size="13" xml:space="preserve"><tspan fill="#cdd6f4">            823 static objects (threshold: 800). Static objects are rendered and</tspan></text>
  <text x="16" y="473" font-family="'Courier New',Courier,'Lucida Console',monospace" font-size="13" xml:space="preserve"><tspan fill="#cdd6f4">            simulated regardless of player proximity.</tspan></text>
  <text x="16" y="493" font-family="'Courier New',Courier,'Lucida Console',monospace" font-size="13" xml:space="preserve"><tspan fill="#cdd6f4">            </tspan><tspan fill="#a6e3a1">Fix:</tspan><tspan fill="#cdd6f4"> Remove decorative statics far from the action area.</tspan></text>
  <text x="16" y="533" font-family="'Courier New',Courier,'Lucida Console',monospace" font-size="13" xml:space="preserve"><tspan fill="#cdd6f4">  </tspan><tspan fill="#f9e2af" font-weight="bold">WARNING</tspan><tspan fill="#cdd6f4">   </tspan><tspan fill="#6c7086">BLOT_003</tspan><tspan fill="#cdd6f4">  High trigger count</tspan></text>
  <text x="16" y="553" font-family="'Courier New',Courier,'Lucida Console',monospace" font-size="13" xml:space="preserve"><tspan fill="#cdd6f4">            168 triggers (threshold: 150). Trigger evaluation runs every server frame.</tspan></text>
  <text x="16" y="573" font-family="'Courier New',Courier,'Lucida Console',monospace" font-size="13" xml:space="preserve"><tspan fill="#cdd6f4">            </tspan><tspan fill="#a6e3a1">Fix:</tspan><tspan fill="#cdd6f4"> Consolidate redundant triggers or convert to script-driven logic.</tspan></text>
  <text x="16" y="613" font-family="'Courier New',Courier,'Lucida Console',monospace" font-size="13" xml:space="preserve"><tspan fill="#cdd6f4">  </tspan><tspan fill="#f9e2af" font-weight="bold">WARNING</tspan><tspan fill="#cdd6f4">   </tspan><tspan fill="#6c7086">BLOT_004</tspan><tspan fill="#cdd6f4">  High trigger zone count</tspan></text>
  <text x="16" y="633" font-family="'Courier New',Courier,'Lucida Console',monospace" font-size="13" xml:space="preserve"><tspan fill="#cdd6f4">            124 trigger zones (threshold: 90). Active zones are evaluated every frame.</tspan></text>
  <text x="16" y="653" font-family="'Courier New',Courier,'Lucida Console',monospace" font-size="13" xml:space="preserve"><tspan fill="#cdd6f4">            </tspan><tspan fill="#a6e3a1">Fix:</tspan><tspan fill="#cdd6f4"> Remove unused zones or merge overlapping zones with identical radii.</tspan></text>
  <text x="16" y="693" font-family="'Courier New',Courier,'Lucida Console',monospace" font-size="13" xml:space="preserve"><tspan fill="#cdd6f4">  </tspan><tspan fill="#f9e2af" font-weight="bold">WARNING</tspan><tspan fill="#cdd6f4">   </tspan><tspan fill="#6c7086">BLOT_008</tspan><tspan fill="#cdd6f4">  Very high total unit count</tspan></text>
  <text x="16" y="713" font-family="'Courier New',Courier,'Lucida Console',monospace" font-size="13" xml:space="preserve"><tspan fill="#cdd6f4">            2104 total units (threshold: 1200). Late-activated units still consume</tspan></text>
  <text x="16" y="733" font-family="'Courier New',Courier,'Lucida Console',monospace" font-size="13" xml:space="preserve"><tspan fill="#cdd6f4">            server memory.</tspan></text>
  <text x="16" y="753" font-family="'Courier New',Courier,'Lucida Console',monospace" font-size="13" xml:space="preserve"><tspan fill="#cdd6f4">            </tspan><tspan fill="#a6e3a1">Fix:</tspan><tspan fill="#cdd6f4"> Audit late-activation groups and remove units unused by the mission.</tspan></text>
  <text x="16" y="793" font-family="'Courier New',Courier,'Lucida Console',monospace" font-size="13" xml:space="preserve"><tspan fill="#cdd6f4">  </tspan><tspan fill="#f9e2af" font-weight="bold">WARNING</tspan><tspan fill="#cdd6f4">   </tspan><tspan fill="#6c7086">PERF_001</tspan><tspan fill="#cdd6f4">  CTLD script detected</tspan></text>
  <text x="16" y="813" font-family="'Courier New',Courier,'Lucida Console',monospace" font-size="13" xml:space="preserve"><tspan fill="#cdd6f4">            CTLD detected in mission scripts. Polling loops run every 1–2s over all</tspan></text>
  <text x="16" y="833" font-family="'Courier New',Courier,'Lucida Console',monospace" font-size="13" xml:space="preserve"><tspan fill="#cdd6f4">            registered transport pilots regardless of player count.</tspan></text>
  <text x="16" y="853" font-family="'Courier New',Courier,'Lucida Console',monospace" font-size="13" xml:space="preserve"><tspan fill="#cdd6f4">            </tspan><tspan fill="#a6e3a1">Fix:</tspan><tspan fill="#cdd6f4"> Reduce registered pilot names or use an event-driven CTLD build.</tspan></text>
  <text x="16" y="893" font-family="'Courier New',Courier,'Lucida Console',monospace" font-size="13" xml:space="preserve"><tspan fill="#cdd6f4">  </tspan><tspan fill="#89b4fa" font-weight="bold">INFO</tspan><tspan fill="#cdd6f4">      </tspan><tspan fill="#6c7086">MAINT_001</tspan><tspan fill="#cdd6f4">  Missing mission description</tspan></text>
  <text x="16" y="913" font-family="'Courier New',Courier,'Lucida Console',monospace" font-size="13" xml:space="preserve"><tspan fill="#cdd6f4">            Sortie name is blank. Add a description in the mission editor for easier</tspan></text>
  <text x="16" y="933" font-family="'Courier New',Courier,'Lucida Console',monospace" font-size="13" xml:space="preserve"><tspan fill="#cdd6f4">            server-side identification.</tspan></text>
</svg>
